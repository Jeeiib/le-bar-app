spring.application.name=bar-app-api

# Base PostgreSQL : valeurs par defaut surchargeables par variables d'environnement (Docker)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/barapp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:barapp}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:barapp}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# JWT (surcharge en production via variables d'environnement)
app.jwt.secret=${APP_JWT_SECRET:dev-secret-a-changer-en-production-1234567890-abcdefgh}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
