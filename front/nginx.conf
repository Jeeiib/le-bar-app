server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression des fichiers statiques
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Taille des requetes (creation d'un cocktail)
    client_max_body_size 10m;

    # Application Vue (mode history) : toute route inconnue retombe sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Appels API relayes vers le service back (reseau interne Docker)
    location /api/ {
        proxy_pass http://back:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
